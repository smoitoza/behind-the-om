  addLog('4. createClient succeeded: ' + !!sb);
} catch(e) {
  addLog('4. createClient ERROR: ' + e.message);
}

addLog('5. document.readyState: ' + document.readyState);
</script>
<script src="./app.js"></script>
<script>
try {

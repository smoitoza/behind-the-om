<!DOCTYPE html>
<html>
<head><title>Debug v2</title></head>
<body>
<div id="view-home" class="view active">
  <input type="text" id="search-input" value="">
  <div class="studios-grid" id="studios-grid"></div>
</div>
<pre id="out">Loading...</pre>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.onerror = function(msg, src, line, col, err) {
  var out = document.getElementById('out');
  out.textContent += '\nGLOBAL ERROR: ' + msg + ' at line ' + line + ':' + col + ' in ' + src;
  if (err && err.stack) out.textContent += '\nStack: ' + err.stack;
  return false;
};
document.getElementById('out').textContent = 'Error handler set. Loading app.js...\n';
</script>
<script src="./app.js"></script>
<script>
var out = document.getElementById('out');
out.textContent += 'app.js finished loading.\n';
out.textContent += 'typeof STUDIOS: ' + typeof STUDIOS + '\n';
out.textContent += 'typeof renderStudios: ' + typeof renderStudios + '\n';

if (typeof STUDIOS !== 'undefined') {
  out.textContent += 'STUDIOS.length: ' + STUDIOS.length + '\n';
} else {
  out.textContent += 'STUDIOS is undefined - app.js likely threw an error during execution\n';
}

if (document.getElementById('studios-grid')) {
  out.textContent += 'Grid innerHTML length: ' + document.getElementById('studios-grid').innerHTML.length + '\n';
}
</script>
</body>
</html>
